<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Biblioteca Online</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .register-container {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 450px;
            margin: 1rem;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .register-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .register-header h1 {
            color: #333;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .register-header h1 span {
            color: #667eea;
        }

        .register-header p {
            color: #666;
            font-size: 1rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #555;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .input-group input {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .input-group input::placeholder {
            color: #aaa;
        }

        .btn-register {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 1rem;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-register:active {
            transform: translateY(0);
        }

        .register-footer {
            text-align: center;
            color: #666;
            font-size: 0.9rem;
        }

        .register-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .register-footer a:hover {
            text-decoration: underline;
        }

        /* Mensajes */
        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            text-align: center;
            font-size: 0.9rem;
            display: none;
        }

        .alert.show {
            display: block;
            animation: shake 0.3s ease;
        }

        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border-left: 4px solid #4CAF50;
        }

        .alert-error {
            background-color: #f8d7da;
            color: #721c24;
            border-left: 4px solid #ff4444;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Password strength indicator */
        .password-strength {
            margin-top: 0.5rem;
            height: 5px;
            border-radius: 3px;
            background: #e0e0e0;
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0;
            transition: all 0.3s ease;
        }

        .strength-weak {
            background: #ff4444;
            width: 33.33%;
        }

        .strength-medium {
            background: #ffbb33;
            width: 66.66%;
        }

        .strength-strong {
            background: #4CAF50;
            width: 100%;
        }

        .password-hint {
            font-size: 0.8rem;
            color: #999;
            margin-top: 0.3rem;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <h1>📚 <span>Biblioteca</span> Online</h1>
            <p>Crea tu cuenta gratuita</p>
        </div>

        <div class="alert" id="alertMessage"></div>

        <form onsubmit="event.preventDefault(); registrarUsuario();">
            <div class="input-group">
                <label for="nombre">👤 Nombre de usuario</label>
                <input type="text" id="nombre" placeholder="Ej: juan_perez" required>
            </div>

            <div class="input-group">
                <label for="password">🔒 Contraseña</label>
                <input type="password" id="password" placeholder="Mínimo 6 caracteres" required onkeyup="checkPasswordStrength()">
                <div class="password-strength">
                    <div class="strength-bar" id="strengthBar"></div>
                </div>
                <div class="password-hint" id="passwordHint">La contraseña debe tener al menos 6 caracteres</div>
            </div>

            <div class="input-group">
                <label for="confirmPassword">🔒 Confirmar contraseña</label>
                <input type="password" id="confirmPassword" placeholder="Repite tu contraseña" required onkeyup="checkPasswordMatch()">
                <div class="password-hint" id="matchHint"></div>
            </div>

            <button type="submit" class="btn-register" id="registerBtn">
                📝 Registrarse
            </button>
        </form>

        <div class="register-footer">
            <p>¿Ya tienes una cuenta? <a href="index.html">Inicia sesión aquí</a></p>
        </div>
    </div>

    <script>
        const API = "http://localhost:8080";

        function checkPasswordStrength() {
            const password = document.getElementById('password').value;
            const strengthBar = document.getElementById('strengthBar');
            const hint = document.getElementById('passwordHint');
            
            // Remover clases anteriores
            strengthBar.className = 'strength-bar';
            
            if (password.length === 0) {
                strengthBar.style.width = '0';
                hint.innerHTML = 'La contraseña debe tener al menos 6 caracteres';
                return;
            }
            
            if (password.length < 6) {
                strengthBar.classList.add('strength-weak');
                hint.innerHTML = '❌ Contraseña demasiado corta';
            } else if (password.length < 10) {
                strengthBar.classList.add('strength-medium');
                hint.innerHTML = '⚠️ Contraseña media';
            } else {
                strengthBar.classList.add('strength-strong');
                hint.innerHTML = '✅ Contraseña fuerte';
            }
        }

        function checkPasswordMatch() {
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const matchHint = document.getElementById('matchHint');
            
            if (confirm.length === 0) {
                matchHint.innerHTML = '';
                return;
            }
            
            if (password === confirm) {
                matchHint.innerHTML = '✅ Las contraseñas coinciden';
                matchHint.style.color = '#4CAF50';
            } else {
                matchHint.innerHTML = '❌ Las contraseñas no coinciden';
                matchHint.style.color = '#ff4444';
            }
        }

        function mostrarMensaje(mensaje, tipo) {
            const alert = document.getElementById('alertMessage');
            alert.textContent = mensaje;
            alert.className = 'alert show alert-' + tipo;
            
            // Ocultar después de 5 segundos
            setTimeout(() => {
                alert.classList.remove('show');
            }, 5000);
        }

        function registrarUsuario() {
            const nombre = document.getElementById('nombre').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // Validaciones
            if (!nombre || !password || !confirmPassword) {
                mostrarMensaje('Todos los campos son obligatorios', 'error');
                return;
            }
            
            if (password.length < 6) {
                mostrarMensaje('La contraseña debe tener al menos 6 caracteres', 'error');
                return;
            }
            
            if (password !== confirmPassword) {
                mostrarMensaje('Las contraseñas no coinciden', 'error');
                return;
            }
            
            // Deshabilitar botón mientras se procesa
            const btn = document.getElementById('registerBtn');
            btn.disabled = true;
            btn.innerHTML = '⏳ Registrando...';
            
            const usuarioData = {
                nombre: nombre,
                password: password,
                tipo: 'usuario'
            };
            
            console.log('Enviando datos de registro:', usuarioData);
            
            fetch(API + "/usuarios/registro", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(usuarioData)
            })
            .then(async response => {
                const text = await response.text();
                console.log('Respuesta:', response.status, text);
                
                if (response.ok) {
                    return JSON.parse(text);
                } else {
                    throw new Error(text);
                }
            })
            .then(data => {
                console.log('Registro exitoso:', data);
                mostrarMensaje('✅ ¡Registro exitoso! Redirigiendo al login...', 'success');
                
                // Guardar datos temporalmente para autocompletar
                sessionStorage.setItem('nuevoUsuario', nombre);
                
                // Redirigir al login después de 2 segundos
                setTimeout(() => {
                    window.location.href = "index.html?registro=exitoso&usuario=" + encodeURIComponent(nombre);
                }, 2000);
            })
            .catch(error => {
                console.error('Error completo:', error);
                mostrarMensaje('❌ Error: ' + error.message, 'error');
                
                // Rehabilitar botón
                btn.disabled = false;
                btn.innerHTML = '📝 Registrarse';
            });
        }
    </script>
</body>
</html>
