<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitudes de Préstamo - Biblioteca Online</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .admin-nav {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }
        .admin-nav a {
            color: white;
            text-decoration: none;
            margin-left: 1rem;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            background: rgba(255,255,255,0.2);
        }
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 2rem;
        }
        .filtros {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            background: white;
            padding: 1.5rem;
            border-radius: 10px;
        }
        .filtros select {
            padding: 0.8rem;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            flex: 1;
        }
        .filtros button {
            padding: 0.8rem 2rem;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        table {
            width: 100%;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        th {
            background: #667eea;
            color: white;
            padding: 1rem;
            text-align: left;
        }
        td {
            padding: 1rem;
            border-bottom: 1px solid #f0f0f0;
        }
        .badge-pendiente {
            background: #ff9800;
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 3px;
            font-size: 0.8rem;
        }
        .badge-aprobado {
            background: #4CAF50;
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 3px;
            font-size: 0.8rem;
        }
        .badge-rechazado {
            background: #f44336;
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 3px;
            font-size: 0.8rem;
        }
        .badge-devuelto {
            background: #2196F3;
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 3px;
            font-size: 0.8rem;
        }
        .btn-aprobar {
            background: #4CAF50;
            color: white;
            padding: 0.3rem 1rem;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            margin-right: 0.5rem;
        }
        .btn-rechazar {
            background: #f44336;
            color: white;
            padding: 0.3rem 1rem;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            margin-right: 0.5rem;
        }
        .btn-devolver {
            background: #2196F3;
            color: white;
            padding: 0.3rem 1rem;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="admin-nav">
        <h2>👑 Panel de Administrador</h2>
        <div>
            <span id="userNameAdmin">Cargando...</span>
            <a href="/admin/dashboard.html">🏠 Dashboard</a>
            <a href="/index.html" onclick="logout()">🚪 Salir</a>
        </div>
    </div>

    <div class="container">
        <h1>📋 Solicitudes de Préstamo</h1>
        
        <div class="filtros">
            <select id="filtroEstado">
                <option value="PENDIENTE">Pendientes</option>
                <option value="APROBADO">Aprobados</option>
                <option value="RECHAZADO">Rechazados</option>
                <option value="DEVUELTO">Devueltos</option>
                <option value="TODOS">Todos</option>
            </select>
            <button onclick="cargarSolicitudes()">🔍 Filtrar</button>
        </div>

        <table id="tablaSolicitudes">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Usuario</th>
                    <th>Libro</th>
                    <th>Fecha Solicitud</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="listaSolicitudes">
                <tr>
                    <td colspan="6" style="text-align: center;">Cargando solicitudes...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        const API = "http://localhost:8080";
        let solicitudes = [];
        let usuarios = [];
        let libros = [];

        // Verificar que es admin
        if (localStorage.getItem('usuarioRol') !== 'ADMIN') {
            window.location.href = "/index.html";
        }

        document.getElementById('userNameAdmin').innerText = `👋 ${localStorage.getItem('usuarioNombre')}`;

        // Cargar datos necesarios
        function cargarDatos() {
            Promise.all([
                fetch(API + "/admin/solicitudes").then(r => r.json()),
                fetch(API + "/admin/usuarios").then(r => r.json()),
                fetch(API + "/libros/todos").then(r => r.json())
            ])
            .then(([solicitudesData, usuariosData, librosData]) => {
                solicitudes = solicitudesData;
                usuarios = usuariosData;
                libros = librosData;
                mostrarSolicitudes(solicitudes);
            })
            .catch(err => console.error("Error cargando datos:", err));
        }

        function cargarSolicitudes() {
            let filtro = document.getElementById('filtroEstado').value;
            
            if (filtro === 'TODOS') {
                mostrarSolicitudes(solicitudes);
            } else {
                let filtradas = solicitudes.filter(s => s.estado === filtro);
                mostrarSolicitudes(filtradas);
            }
        }

        function mostrarSolicitudes(lista) {
            let html = "";
            
            lista.forEach(s => {
                let usuario = usuarios.find(u => u.id === s.usuarioId);
                let libro = libros.find(l => l.id === s.libroId);
                
                let nombreUsuario = usuario ? usuario.nombre : 'ID: ' + s.usuarioId;
                let tituloLibro = libro ? libro.titulo : 'ID: ' + s.libroId;
                
                let badgeClass = '';
                if (s.estado === 'PENDIENTE') badgeClass = 'badge-pendiente';
                else if (s.estado === 'APROBADO') badgeClass = 'badge-aprobado';
                else if (s.estado === 'RECHAZADO') badgeClass = 'badge-rechazado';
                else if (s.estado === 'DEVUELTO') badgeClass = 'badge-devuelto';
                
                let acciones = '';
                if (s.estado === 'PENDIENTE') {
                    acciones = `
                        <button class="btn-aprobar" onclick="aprobarSolicitud(${s.id})">✅ Aprobar</button>
                        <button class="btn-rechazar" onclick="rechazarSolicitud(${s.id})">❌ Rechazar</button>
                    `;
                } else if (s.estado === 'APROBADO') {
                    acciones = `<button class="btn-devolver" onclick="devolverLibro(${s.id})">🔄 Marcar devuelto</button>`;
                } else {
                    acciones = '-';
                }
                
                html += `
                    <tr>
                        <td>${s.id}</td>
                        <td>${nombreUsuario}</td>
                        <td>${tituloLibro}</td>
                        <td>${s.fechaSolicitud}</td>
                        <td><span class="${badgeClass}">${s.estado}</span></td>
                        <td>${acciones}</td>
                    </tr>
                `;
            });
            
            document.getElementById('listaSolicitudes').innerHTML = html || '<tr><td colspan="6" style="text-align: center;">No hay solicitudes</td></tr>';
        }

        function aprobarSolicitud(id) {
            if (!confirm('¿Aprobar esta solicitud?')) return;
            
            fetch(API + "/admin/solicitudes/" + id + "/aprobar", { method: 'POST' })
            .then(async r => {
                if (r.ok) {
                    alert('✅ Solicitud aprobada');
                    cargarDatos();
                } else {
                    const error = await r.text();
                    alert('❌ Error: ' + error);
                }
            });
        }

        function rechazarSolicitud(id) {
            if (!confirm('¿Rechazar esta solicitud?')) return;
            
            fetch(API + "/admin/solicitudes/" + id + "/rechazar", { method: 'POST' })
            .then(async r => {
                if (r.ok) {
                    alert('✅ Solicitud rechazada');
                    cargarDatos();
                } else {
                    const error = await r.text();
                    alert('❌ Error: ' + error);
                }
            });
        }

        function devolverLibro(id) {
            if (!confirm('¿Marcar este libro como devuelto?')) return;
            
            fetch(API + "/admin/solicitudes/" + id + "/devolver", { method: 'POST' })
            .then(async r => {
                if (r.ok) {
                    alert('✅ Libro devuelto');
                    cargarDatos();
                } else {
                    const error = await r.text();
                    alert('❌ Error: ' + error);
                }
            });
        }

        function logout() {
            localStorage.removeItem('usuarioId');
            localStorage.removeItem('usuarioNombre');
            localStorage.removeItem('usuarioRol');
            window.location.href = "/index.html";
        }

        cargarDatos();
    </script>
</body>
</html>
