<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Biblioteca Online</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            margin: 1rem;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h1 {
            color: #333;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .login-header h1 span {
            color: #667eea;
        }

        .login-header p {
            color: #666;
            font-size: 1rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #555;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .input-group input {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .input-group input::placeholder {
            color: #aaa;
        }

        .btn-login {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 1rem;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-register {
            width: 100%;
            padding: 1rem;
            background: transparent;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 1rem;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-register:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-register:active {
            transform: translateY(0);
        }

        /* Botón de catálogo público */
        .btn-catalogo {
            width: 100%;
            padding: 1rem;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 1rem;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-catalogo:hover {
            background: #1976D2;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(33, 150, 243, 0.3);
        }

        .btn-catalogo:active {
            transform: translateY(0);
        }

        /* Divisor */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
            color: #999;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e0e0e0;
        }

        .divider span {
            padding: 0 10px;
            font-size: 0.9rem;
        }

        .login-footer {
            text-align: center;
            color: #666;
            font-size: 0.9rem;
            margin-top: 1rem;
        }

        .login-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        /* Mensajes de alerta */
        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            text-align: center;
            font-size: 0.9rem;
            display: none;
        }

        .alert.show {
            display: block;
            animation: shake 0.3s ease;
        }

        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border-left: 4px solid #4CAF50;
        }

        .alert-error {
            background-color: #f8d7da;
            color: #721c24;
            border-left: 4px solid #ff4444;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Demo credentials */
        .demo-credentials {
            background-color: #f8f9fa;
            padding: 1rem;
            border-radius: 10px;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            border: 1px dashed #667eea;
        }

        .demo-credentials p {
            color: #555;
            margin-bottom: 0.3rem;
        }

        .demo-credentials span {
            color: #667eea;
            font-weight: 600;
        }

        /* Mensaje informativo */
        .info-message {
            text-align: center;
            margin: 1rem 0;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>📚 <span>Biblioteca</span> Online</h1>
            <p>Ingresa con tus credenciales</p>
        </div>

        <!-- Mensaje de alerta (para éxito/error) -->
        <div class="alert" id="alertMessage"></div>

        <form onsubmit="event.preventDefault(); login();">
            <div class="input-group">
                <label for="usuario">👤 Usuario</label>
                <input type="text" id="usuario" placeholder="Ej: jesus, admin" required>
            </div>

            <div class="input-group">
                <label for="password">🔒 Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login">
                <span>🔑</span> Iniciar Sesión
            </button>
        </form>

        <!-- NUEVO: Botón de catálogo público -->
        <div class="info-message">
            <p>¿Quieres ver nuestros libros primero?</p>
        </div>
        <a href="/catalogo" class="btn-catalogo">
            📚 Ver Catálogo sin registrarme
        </a>

        <!-- Divisor y botón de registro -->
        <div class="divider">
            <span>¿Nuevo aquí?</span>
        </div>

        <a href="registro.html" class="btn-register">
            <span>📝</span> Crear una cuenta
        </a>

        <div class="login-footer">
            <p>¿Olvidaste tu contraseña? <a href="#">Contacta al administrador</a></p>
        </div>

        <div class="demo-credentials">
            <p><span>✨ Demo:</span> Usuario: jesus / Contraseña: 12345</p>
            <p><span>✨ Demo:</span> Usuario: admin / Contraseña: 123456</p>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        const API = "http://localhost:8080";

        function mostrarMensaje(mensaje, tipo) {
            const alert = document.getElementById('alertMessage');
            alert.textContent = mensaje;
            alert.className = 'alert show alert-' + tipo;
            
            setTimeout(() => {
                alert.classList.remove('show');
            }, 5000);
        }

        function login() {
            let usuario = document.getElementById("usuario").value;
            let password = document.getElementById("password").value;

            if (!usuario || !password) {
                mostrarMensaje('❌ Por favor completa todos los campos', 'error');
                return;
            }

            fetch(API + "/usuarios/login", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({nombre: usuario, password: password})
            })
            .then(async response => {
                if (response.ok) {
                    return response.json();
                } else {
                    const error = await response.text();
                    throw new Error(error);
                }
            })
            .then(data => {
                if (data && data.id) {
                    mostrarMensaje('✅ Login exitoso! Redirigiendo...', 'success');
                    localStorage.setItem('usuarioId', data.id);
                    localStorage.setItem('usuarioNombre', data.nombre);
                    
                    setTimeout(() => {
                        window.location.href = "buscar.html";
                    }, 1500);
                } else {
                    mostrarMensaje('❌ Usuario o contraseña incorrectos', 'error');
                }
            })
            .catch(err => {
                console.error("Error:", err);
                mostrarMensaje('❌ Error al conectar con el servidor', 'error');
            });
        }

        // Mostrar mensaje si viene de registro exitoso
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('registro') === 'exitoso') {
                const usuario = urlParams.get('usuario');
                mostrarMensaje(`✅ ¡Registro exitoso! Bienvenido ${usuario}. Por favor inicia sesión.`, 'success');
                document.getElementById('usuario').value = usuario;
            }
        });
    </script>
</body>
</html>
